<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft ground shadow -->
  <ellipse cx="120" cy="215" rx="55" ry="10" fill="#2D3748" opacity="0.08"/>

  <!-- Antenna pulsing -->
  <line x1="120" y1="38" x2="120" y2="18" stroke="#4F9DFF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="120" cy="14" r="9" fill="#FFB84D"/>
  <circle cx="120" cy="14" r="14" fill="#FFB84D" opacity="0.25"/>

  <!-- Head -->
  <rect x="62" y="40" width="116" height="92" rx="36" fill="#4F9DFF"/>

  <!-- Face screen -->
  <rect x="78" y="58" width="84" height="56" rx="22" fill="#FFFFFF"/>

  <!-- Wide attentive eyes -->
  <circle cx="106" cy="86" r="10" fill="#2D3748"/>
  <circle cx="146" cy="86" r="10" fill="#2D3748"/>
  <circle cx="109.5" cy="82" r="2.6" fill="#FFFFFF"/>
  <circle cx="149.5" cy="82" r="2.6" fill="#FFFFFF"/>

  <!-- Small "oh!" mouth -->
  <circle cx="126" cy="102" r="6" fill="#2D3748"/>

  <!-- Cheeks -->
  <circle cx="92" cy="98" r="6" fill="#FFB84D" opacity="0.55"/>
  <circle cx="160" cy="98" r="6" fill="#FFB84D" opacity="0.55"/>

  <!-- Body -->
  <rect x="74" y="132" width="92" height="68" rx="28" fill="#7CDE7A"/>

  <!-- Chest gear / badge -->
  <circle cx="120" cy="164" r="18" fill="#FFFFFF"/>
  <circle cx="120" cy="164" r="18" fill="none" stroke="#4F9DFF" stroke-width="3"/>
  <circle cx="120" cy="164" r="5" fill="#4F9DFF"/>

  <!-- Arms -->
  <rect x="48" y="140" width="24" height="14" rx="7" fill="#FFB84D"/>
  <rect x="168" y="140" width="24" height="14" rx="7" fill="#FFB84D"/>
  <circle cx="44" cy="147" r="10" fill="#FFB84D"/>
  <circle cx="196" cy="147" r="10" fill="#FFB84D"/>

  <!-- Sound waves near ear/head indicating listening/speaking -->
  <g stroke="#FFB84D" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M192 70 q8 16 0 32"/>
    <path d="M202 62 q14 24 0 48"/>
  </g>
  <g stroke="#FFB84D" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M48 70 q-8 16 0 32"/>
    <path d="M38 62 q-14 24 0 48"/>
  </g>

  <!-- Legs -->
  <rect x="88" y="196" width="20" height="20" rx="8" fill="#4F9DFF"/>
  <rect x="132" y="196" width="20" height="20" rx="8" fill="#4F9DFF"/>
</svg>
