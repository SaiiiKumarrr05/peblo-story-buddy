  <rect x="176" y="108" width="24" height="14" rx="7" fill="#FFB84D" transform="rotate(35 188 115)"/>
  <circle cx="36" cy="100" r="10" fill="#FFB84D"/>
  <circle cx="204" cy="100" r="10" fill="#FFB84D"/>

  <!-- Legs -->
