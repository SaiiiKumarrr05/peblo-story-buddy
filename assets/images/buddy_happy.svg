  <rect x="132" y="196" width="20" height="20" rx="8" fill="#4F9DFF"/>

  <!-- Sparkles -->
  <g fill="#FFB84D">
    <path d="M30 60 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"/>
    <path d="M205 50 l2.5 6.5 l6.5 2.5 l-6.5 2.5 l-2.5 6.5 l-2.5 -6.5 l-6.5 -2.5 l6.5 -2.5 z"/>
