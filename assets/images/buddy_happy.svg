  <circle cx="120" cy="10" r="10" fill="#00C853"/>
  <path d="M120 -2 v6 M120 16 v6 M108 10 h6 M126 10 h6" stroke="#FFB84D" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head -->
  <rect x="62" y="40" width="116" height="92" rx="36" fill="#4F9DFF"/>

  <!-- Face screen -->
  <rect x="78" y="58" width="84" height="56" rx="22" fill="#FFFFFF"/>

  <!-- Happy closed eyes (^_^) -->
  <path d="M98 88 Q106 78 114 88" stroke="#2D3748" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M138 88 Q146 78 154 88" stroke="#2D3748" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Big open smile -->
