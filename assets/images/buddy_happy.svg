  <circle cx="120" cy="164" r="18" fill="none" stroke="#00C853" stroke-width="3"/>
  <path d="M112 164 l6 6 l12 -14" stroke="#00C853" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arms raised up in celebration -->
