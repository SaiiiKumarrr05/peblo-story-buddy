name: peblo_story_buddy
description: "Peblo AI Story Buddy — an interactive, AI-narrated story and quiz experience for kids."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Text to speech
  flutter_tts: ^4.0.2

  # Celebration animation
  confetti: ^0.7.0

  # Typography
  google_fonts: ^6.2.1

  # Declarative animations
  flutter_animate: ^4.5.0

  # Vector illustrations for the AI buddy
  flutter_svg: ^2.0.10+1

  # Haptic feedback (wrong answer shake)
  # (provided by Flutter's services.dart — no package needed)

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Uncomment if custom font files are bundled instead of using google_fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
